name: "Docker Release"

# 打 tag 时触发，自动构建 Docker 镜像并推送到 Docker Hub（仅 GitHub）
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    # 仅在 GitHub 上运行（Gitea 上不触发）
    if: ${{ github.server_url == 'https://github.com' }}

    steps:
      # 1) 检出当前分支（后端）
      - name: Checkout backend
        uses: actions/checkout@v5

      # 2) 额外检出前端分支 v2-web 到 frontend-src 目录
      - name: Checkout frontend (v2-web)
        uses: actions/checkout@v5
        with:
          ref: v2-web
          path: frontend-src

      - name: Cache Gradle files
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Bun files
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup bun
        run: npm install bun

      - name: Build Frontend
        working-directory: frontend-src
        run: |
          npx bun i
          npx bun run build

      # 去掉 sourcemap，减小镜像体积
      - name: Remove frontend sourcemaps
        run: find frontend-src/dist -type f -name '*.map' -delete

      # ===== 后端构建 =====
      - name: Setup Executable Permission
        run: chmod +x gradlew

      - name: Build With Gradle
        run: ./gradlew bootJar --no-daemon --parallel --build-cache --no-scan

      # ===== Docker 构建 & 推送 =====
      # 需要在 GitHub 仓库 Settings -> Secrets and variables -> Actions 配置：
      #   Secrets:
      #     DOCKERHUB_USERNAME - Docker Hub 用户名
      #     DOCKERHUB_TOKEN    - Docker Hub Access Token（非登录密码）
      #   Variables（可选）:
      #     DOCKERHUB_IMAGE    - 覆盖默认镜像名（默认 wzpa/file-manager）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_IMAGE || 'wzpa/file-manager' }}
          # tag v2.0.2 -> 镜像 tag 2.0.2，并打 latest
          tags: |
            type=match,pattern=v(.*),group=1
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

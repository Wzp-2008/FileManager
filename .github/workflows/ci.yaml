name: "编译"
on:
  push:
    branches:
      - master
      - v2-web
  workflow_dispatch:

jobs:
  Building:
    runs-on: ubuntu-latest

    env:
      PROXY_HOST: 192.168.5.6
      PROXY_PORT: 7890
      IS_GITEA: ${{ github.server_url != 'https://github.com' }}

    steps:
      # 1) 检出当前分支（后端）
      - name: Checkout backend
        uses: actions/checkout@v5

      # 2) 额外检出前端分支 v2-web 到 frontend-src 目录
      - name: Checkout frontend (v2-web)
        uses: actions/checkout@v5
        with:
          ref: v2-web
          path: frontend-src

      - name: Set Gradle Proxy (Gitea only)
        if: env.IS_GITEA == 'true'
        run: |
          mkdir -p ~/.gradle
          {
            echo "systemProp.http.proxyHost=${PROXY_HOST}"
            echo "systemProp.http.proxyPort=${PROXY_PORT}"
            echo "systemProp.https.proxyHost=${PROXY_HOST}"
            echo "systemProp.https.proxyPort=${PROXY_PORT}"
          } >> ~/.gradle/gradle.properties

      - name: Cache Gradle files
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ env.IS_GITEA }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ env.IS_GITEA }}-
            ${{ runner.os }}-gradle-

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set npm CN Mirror (Gitea only)
        if: env.IS_GITEA == 'true'
        run: npm config set registry https://registry.npmmirror.com

      - name: Setup bun
        run: npm install bun

      - name: Build Frontend
        working-directory: frontend-src
        run: |
          npx bun i
          npx bun run build

      # ===== 后端构建 =====
      - name: Setup Executable Permission
        run: chmod +x gradlew

      - name: Build With Gradle
        run: ./gradlew bootJar --no-daemon --parallel --build-cache --no-scan

      - name: Prepare backend artifact
        run: |
          cp build/libs/FileManager-0.0.1-SNAPSHOT.jar FileManager.jar

      # 组合包：FileManager.jar + static(=前端dist)
      - name: Prepare combined package
        run: |
          rm -rf release
          mkdir -p release/static
          cp FileManager.jar release/FileManager.jar
          cp -r frontend-src/dist/* release/static/

      # ===== 上传产物 =====
      - name: Upload backend jar
        uses: actions/upload-artifact@v4
        with:
          name: FileManager.jar
          path: FileManager.jar

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: frontend-src/dist

      - name: Upload combined package
        uses: actions/upload-artifact@v4
        with:
          name: FileManager-with-static
          path: release
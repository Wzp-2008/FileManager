name: "编译"
on:
  push:
    branches:
      - master
      - v2-web
  workflow_dispatch:

jobs:
  Building:
    runs-on: ubuntu-latest

    env:
      PROXY_HOST: 192.168.5.6
      PROXY_PORT: 7890
      IS_GITEA: ${{ github.server_url != 'https://github.com' }}

    steps:
      # 1) 检出当前分支（后端）
      - name: Checkout backend
        uses: actions/checkout@v5

      # 2) 额外检出前端分支 v2-web 到 frontend-src 目录
      - name: Checkout frontend (v2-web)
        uses: actions/checkout@v5
        with:
          ref: v2-web
          path: frontend-src

      - name: Set Gradle Mirror (Gitea only)
        if: env.IS_GITEA == 'true'
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/init.gradle << 'EOF'
          // 阿里云gradle插件镜像仓库地址
          final PLUGIN_SOURCE = "https://maven.aliyun.com/repository/gradle-plugin"
          // 阿里云maven镜像仓库地址
          final PUBLIC_REPOSITORY = "https://maven.aliyun.com/repository/public"
          // 阿里云google镜像仓库地址
          final GOOGLE_REPOSITORY = "https://maven.aliyun.com/repository/google"
          final PRIVATE_REPO = "https://wzpmc.cn:90/repository/maven-public/"
          
          gradle.settingsEvaluated { settings ->
              settings.pluginManagement.repositories { repos ->
                  repos.maven { url PRIVATE_REPO }
                  repos.maven { url PLUGIN_SOURCE }
                  repos.maven { url GOOGLE_REPOSITORY }
                  repos.gradlePluginPortal()
                  repos.mavenCentral()
              }
          
              settings.dependencyResolutionManagement { drm ->
                  drm.repositories { repos ->
                      repos.maven { url PRIVATE_REPO }
                      repos.maven { url PUBLIC_REPOSITORY }
                      repos.maven { url GOOGLE_REPOSITORY }
                      repos.google()
                      repos.mavenCentral()
                  }
              }
          }
          EOF

      - name: Cache Gradle files
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ env.IS_GITEA }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ env.IS_GITEA }}-
            ${{ runner.os }}-gradle-
      - name: Cache Bun files
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/cache
          key: ${{ runner.os }}-bun-${{ env.IS_GITEA }}-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ env.IS_GITEA }}-
            ${{ runner.os }}-bun-
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set npm CN Mirror (Gitea only)
        if: env.IS_GITEA == 'true'
        run: npm config set registry https://registry.npmmirror.com

      - name: Setup bun
        run: npm install bun

      - name: Build Frontend
        working-directory: frontend-src
        run: |
          npx bun i
          npx bun run build

      # ===== 后端构建 =====
      - name: Setup Executable Permission
        run: chmod +x gradlew

      - name: Build With Gradle
        run: ./gradlew bootJar --no-daemon --parallel --build-cache --no-scan

      - name: Prepare backend artifact
        run: |
          cp build/libs/FileManager-0.0.1-SNAPSHOT.jar FileManager.jar

      # ===== 上传产物 =====
      - name: Upload backend jar
        uses: actions/upload-artifact@v7
        with:
          name: FileManager
          path: FileManager.jar

      - name: Upload frontend dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: frontend-src/dist

      - name: Remove map file
        run: |
          find frontend-src/dist -type f -name '*.map' -delete

      - name: Upload frontend dist (without map file)
        uses: actions/upload-artifact@v7
        with:
          name: web-static
          path: frontend-src/dist

      # 组合包：FileManager.jar + static(=前端dist)
      - name: Prepare combined package
        run: |
          rm -rf release
          mkdir -p release/static
          cp FileManager.jar release/FileManager.jar
          cp -r frontend-src/dist/* release/static/

      - name: Upload combined package
        uses: actions/upload-artifact@v7
        with:
          name: FileManager-with-static
          path: release

      # ===== Gitea 环境：构建并推送 Docker 镜像 =====
      - name: Create Dockerfile (Gitea only)
        if: env.IS_GITEA == 'true'
        run: |
          cat > release/Dockerfile << 'EOF'
          FROM eclipse-temurin:17-jre-alpine
          WORKDIR /app
          COPY FileManager.jar app.jar
          COPY static/ static/
          EXPOSE 8080
          CMD ["java", "-jar", "app.jar"]
          EOF

      - name: Login to Docker Registry (Gitea only)
        if: env.IS_GITEA == 'true'
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login ${{ secrets.DOCKER_REGISTRY }} -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build and Push Docker Image (Gitea only)
        if: env.IS_GITEA == 'true'
        run: |
          IMAGE_BASE="${{ secrets.DOCKER_REGISTRY }}/filemanager"
          SHA_TAG="$IMAGE_BASE:${{ github.sha }}"
          BRANCH_TAG="$IMAGE_BASE:${{ github.ref_name }}"
          docker build -t "$SHA_TAG" release/
          docker tag "$SHA_TAG" "$BRANCH_TAG"
          docker push "$SHA_TAG"
          docker push "$BRANCH_TAG"
          # 仅在 master 分支同时推送 latest 标签
          if [ "${{ github.ref_name }}" = "master" ]; then
            docker tag "$SHA_TAG" "$IMAGE_BASE:latest"
            docker push "$IMAGE_BASE:latest"
          fi
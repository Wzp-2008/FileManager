# ============================================================
# 完整版：自带 PostgreSQL + Redis，开箱即用
# ------------------------------------------------------------
# 使用方式：
#   1. cp .env.example .env
#   2. 修改 .env 中的密码、HMAC_KEY 等
#   3. docker compose up -d
# ============================================================
services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fsv2}
      POSTGRES_USER: ${POSTGRES_USER:-filemanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-filemanager} -d ${POSTGRES_DB:-fsv2}" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7
    restart: unless-stopped
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD:-change-me}" ]
    environment:
      # 供 redis-cli healthcheck 认证使用
      REDISCLI_AUTH: ${REDIS_PASSWORD:-change-me}
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  file-manager:
    image: ${IMAGE:-wzpa/file-manager:2.0.3}
    restart: unless-stopped
    ports:
      - "${PORT:-23456}:8080"
    environment:
      # 主数据库（PostgreSQL）
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-fsv2}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-filemanager}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      SPRING_DATASOURCE_DRUID_DB_TYPE: postgresql # 不要修改！此配置用于识别 PostgreSQL
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_DATABASE: 1
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-change-me}
      # 最大文件大小
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: 100GB
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: 100GB
      # 系统配置
      WZP_FILEMANAGER_SAVE_PATH: /file
      WZP_FILEMANAGER_HMAC_KEY: ${HMAC_KEY:-change-this-to-a-random-secret}
    volumes:
      - ./file:/file # 改前面的 ./file 可更换文件存储位置
      # 修复时区不同的问题
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
